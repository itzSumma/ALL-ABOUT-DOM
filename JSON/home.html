    body {

    #post-container {
      max-width: 980px;
      margin: 40px auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-gap: 20px;
      row: gap 30px;
    }

    .post-card {
  background: #fff;
  padding: 20px;
  margin: 0;              
 width: auto;
  height: 100%;             
  box-sizing: border-box;   
 
  border: 1px solid blueviolet;
  border-radius: 15px;
  box-shadow: 2px 4px 8px rgba(3, 3, 3, 0.8);
  transition: 0.5s;
}
    .post-card {
      text-align: justify;
    }

    .post-card:hover {
      transform: translateY(-5px);
    }

    .user-id {
      background: #2563eb;
      color: white;
      padding: 4px 8px;
      border-radius: 20px;
      font-size: 12px;
      display: inline-block;
      margin-bottom: 10px;
    }

    .title {
      font-size: 18px;
      margin-bottom: 10px;
      text-transform: capitalize;
    }

    .body {
      color: rgb(194, 194, 163);
      font-size: 14px;
    }
  </style>
